name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: |
          shellcheck bin/fledge-figma
          shellcheck bin/fledge-figma-diff
          shellcheck hooks/post-install.sh
          shellcheck hooks/post-remove.sh
