name: CI

on:
  push:
    branches: [main]
    paths:
      - bin/**
      - hooks/**
      - plugin.toml
      - .github/workflows/ci.yml
  pull_request:
    branches: [main]
    paths:
      - bin/**
      - hooks/**
      - plugin.toml
      - .github/workflows/ci.yml

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        run: |
          shellcheck bin/fledge-figma
          shellcheck bin/fledge-figma-diff
          shellcheck hooks/post-install.sh
          shellcheck hooks/post-remove.sh
